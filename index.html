<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Pro Max</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
text-align:center;
}

.container{
background:#fff;
color:#000;
padding:25px;
margin:40px auto;
border-radius:15px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
padding:12px;
margin:6px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
padding:12px;
margin:6px;
width:90%;
height:130px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
background:#667eea;
color:#fff;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
transform:scale(1.05);
}

.hidden{display:none;}
#error{color:red;}
.answer-btn{display:block;width:100%;margin:8px 0;}
.admin-btn{background:#e53e3e;}
.unban-btn{background:#38a169;}
.blur{filter:blur(8px);}
</style>

</head>

<body>

<div class="container">

<h2>🎮 دەست بە کویز بکە</h2>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

<div id="authBox">

<input id="username" placeholder="ناو">
<input id="password" type="password" placeholder="پاسوۆرد">

<button onclick="register()">دروستکردن</button>
<button onclick="login()">چوونە ژوورەوە</button>

<hr>

<h4>ڕیسێتی ئەکاونت</h4>
<input id="resetCode" placeholder="کۆدی ڕیسێت">
<input id="resetUser" placeholder="ناو">
<button onclick="resetAccount()">ڕیسێت</button>

</div>

<h3 id="error"></h3>

<div id="startBox" class="hidden">

<button onclick="startQuiz()">🚀 دەست بە کویز بکە</button>

<br>

<input id="adminCode" placeholder="کۆدی ئەدمین">
<button onclick="beAdmin()">👑</button>

<br>

<button onclick="logout()" style="background:red;">🚪 Logout</button>

</div>

<div id="quiz" class="hidden">

<h3 id="timer"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="resultText"></h3>

<button id="nextBtn" class="hidden" onclick="nextQ()">➡️ داهاتوو</button>

</div>

<div id="adminPanel" class="hidden">

<h3>👑 پانێلی ئەدمین</h3>

<input id="q" placeholder="پرسیار">
<input id="a1" placeholder="وەڵام 1">
<input id="a2" placeholder="وەڵام 2">
<input id="a3" placeholder="وەڵام 3">
<input id="a4" placeholder="وەڵام 4">
<input id="correct" placeholder="وەڵامی ڕاست (0-3)">
<input id="time" placeholder="کات (چرکە)">

<button onclick="addQ()">➕ زیادکردن</button>

<textarea id="bulkQuestions" placeholder="پرسیار|وەڵام1|وەڵام2|وەڵام3|وەڵام4|ڕاست|کات"></textarea>

<button onclick="addBulk()">📥 زیادکردنی زۆر</button>

<h3>📚 پرسیارەکانت</h3>

<div id="myQuestions"></div>

<button onclick="loadMyQuestions()">🔄 نوێکردنەوە</button>

<h3>👥 یوزەرەکان</h3>
<div id="userList"></div>

<h3>📊 ئەنجامەکان</h3>
<div id="resultsBox"></div>

</div>

</div>

<script>

// initial storage
if(!localStorage.getItem("questions")){
localStorage.setItem("questions", JSON.stringify({}));
}

// auto login
window.onload = function(){

let saved = localStorage.getItem("currentUser");

if(saved){
currentUser = saved;
authBox.classList.add("hidden");
startBox.classList.remove("hidden");
}

loadLeaderboard();

};

// users
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;

// codes
let ADMIN_CODE = "9999000785ggfkfvjkingaso990099mr.aso";
let RESET_CODE = "resetofnuc9jevooop";

// register
function register(){

let u = username.value.trim();
let p = password.value;

if(!u || !p){
error.innerText = "ناو و پاسوۆرد";
return;
}

if(users.find(x=>x.u===u)){
error.innerText = "هەیە";
return;
}

users.push({u,p});

localStorage.setItem("users", JSON.stringify(users));

error.innerText = "✔";

}

// login
function login(){

let u = username.value.trim();
let p = password.value;

let user = users.find(x=>x.u===u && x.p===p);

if(!user){
error.innerText = "هەڵە";
return;
}

currentUser = u;

localStorage.setItem("currentUser", u);

authBox.classList.add("hidden");
startBox.classList.remove("hidden");

}

// logout
function logout(){

localStorage.removeItem("currentUser");

location.reload();

}

// reset account
function resetAccount(){

if(resetCode.value !== RESET_CODE){
alert("هەڵە");
return;
}

users = users.filter(u=>u.u !== resetUser.value.trim());

let played = JSON.parse(localStorage.getItem("played") || "[]");

played = played.filter(p=>p !== resetUser.value.trim());

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("played", JSON.stringify(played));

alert("✔ ڕیسێت کرا");

}

// admin
function beAdmin(){

if(adminCode.value === ADMIN_CODE){

adminPanel.classList.remove("hidden");

loadUsers();
loadResults();
loadMyQuestions();

}else{
alert("هەڵە");
}

}

// load users
function loadUsers(){

let bans = JSON.parse(localStorage.getItem("bans") || "{}");

let myBans = bans[currentUser] || [];

userList.innerHTML = users.map(u=>`
<div>
${u.u}
<button class="admin-btn" onclick="banUser('${u.u}')">🚫</button>
<button class="unban-btn" onclick="unbanUser('${u.u}')">✅</button>
${myBans.includes(u.u) ? " (باندکراو)" : ""}
</div>
`).join("");

}

// ban user
function banUser(user){

let bans = JSON.parse(localStorage.getItem("bans") || "{}");

if(!bans[currentUser]){
bans[currentUser] = [];
}

if(!bans[currentUser].includes(user)){
bans[currentUser].push(user);
}

localStorage.setItem("bans", JSON.stringify(bans));

loadUsers();

}

// unban
function unbanUser(user){

let bans = JSON.parse(localStorage.getItem("bans") || "{}");

if(!bans[currentUser]) return;

bans[currentUser] = bans[currentUser].filter(u=>u !== user);

localStorage.setItem("bans", JSON.stringify(bans));

loadUsers();

}

// add question
function addQ(){

let draft = JSON.parse(localStorage.getItem("draft") || "{}");
let live = JSON.parse(localStorage.getItem("questions") || "{}");

if(!draft[currentUser]) draft[currentUser] = [];
if(!live[currentUser]) live[currentUser] = [];

let newQ = {
q: q.value,
a: [a1.value, a2.value, a3.value, a4.value],
c: parseInt(correct.value),
t: parseInt(time.value)
};

draft[currentUser].push(newQ);
live[currentUser].push(newQ);

localStorage.setItem("draft", JSON.stringify(draft));
localStorage.setItem("questions", JSON.stringify(live));

// reset
localStorage.removeItem("played");

alert("✔ زیادکرا");

loadMyQuestions();

}

// bulk add
function addBulk(){

let text = bulkQuestions.value.trim();

if(!text) return;

let lines = text.split("\n");

let draft = JSON.parse(localStorage.getItem("draft") || "{}");
let live = JSON.parse(localStorage.getItem("questions") || "{}");

if(!draft[currentUser]) draft[currentUser] = [];
if(!live[currentUser]) live[currentUser] = [];

for(let line of lines){

let p = line.split("|");

if(p.length < 7) continue;

let newQ = {
q: p[0],
a: [p[1], p[2], p[3], p[4]],
c: parseInt(p[5]),
t: parseInt(p[6])
};

if(draft[currentUser].length < 500){
draft[currentUser].push(newQ);
live[currentUser].push(newQ);
}

}

localStorage.setItem("draft", JSON.stringify(draft));
localStorage.setItem("questions", JSON.stringify(live));

localStorage.removeItem("played");

alert("✔ زیادکرا");

loadMyQuestions();

}

// show my questions
function loadMyQuestions(){

let data = JSON.parse(localStorage.getItem("questions") || "{}");

let list = data[currentUser] || [];

myQuestions.innerHTML = list.map((q,i)=>`
<div style="border:1px solid #ccc;margin:8px;padding:8px">
<b>${i+1}</b> ${q.q}
<br>✔ ${q.a[q.c]}
<br>
<button onclick="deleteQ(${i})">🗑</button>
</div>
`).join("");

}

// delete question
function deleteQ(i){

let data = JSON.parse(localStorage.getItem("questions") || "{}");
let draft = JSON.parse(localStorage.getItem("draft") || "{}");

data[currentUser].splice(i,1);
draft[currentUser].splice(i,1);

localStorage.setItem("questions", JSON.stringify(data));
localStorage.setItem("draft", JSON.stringify(draft));

localStorage.removeItem("played");

loadMyQuestions();

}

// quiz
let score = 0;
let current;

function startQuiz(){

let played = JSON.parse(localStorage.getItem("played") || "[]");

if(played.includes(currentUser)){
error.innerText = "❌ تۆ پێشتر یاری کردووە";
return;
}

let data = JSON.parse(localStorage.getItem("questions") || "{}");

let all = [];

for(let key in data){
all = all.concat(data[key]);
}

if(all.length === 0){
error.innerText = "❌ پرسیار نیە";
return;
}

startBox.classList.add("hidden");
quiz.classList.remove("hidden");

current = all[Math.floor(Math.random() * all.length)];

question.innerText = current.q;

answers.innerHTML = current.a.map(a=>
`<button class="answer-btn" onclick="answer('${a}')">${a}</button>`
).join("");

}

// answer
function answer(a){

if(a === current.a[current.c]){
score++;
}

finish();

}

// finish
function finish(){

let played = JSON.parse(localStorage.getItem("played") || "[]");

played.push(currentUser);

localStorage.setItem("played", JSON.stringify(played));

let results = JSON.parse(localStorage.getItem("results") || "[]");

results.push({
user: currentUser,
score: score
});

localStorage.setItem("results", JSON.stringify(results));

loadLeaderboard();

alert("🎉 سکۆر: " + score);

}

// leaderboard
function loadLeaderboard(){

let results = JSON.parse(localStorage.getItem("results") || "[]");

results.sort((a,b)=>b.score-a.score);

leaderboard.innerHTML = results.map(r=>
`<div>${r.user} - ${r.score}</div>`
).join("");

}

</script>

</body>
</html>
